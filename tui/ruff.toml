# Ruff configuration for bartleby-tui.
# Lives in its own file to keep pyproject.toml focused on packaging metadata.

line-length = 100
target-version = "py312"
src = ["src", "tests"]

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "SIM", # flake8-simplify
    "RUF", # ruff-specific
]
ignore = []

[lint.per-file-ignores]
"tests/*" = ["B011"]  # assert False in tests is fine
